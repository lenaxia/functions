---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Function Builder

on:
  workflow_call:
    inputs:
      function:
        type: string
        description: Function Name
        required: true
      release:
        type: boolean
        description: Release
        required: true

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      function-exists: ${{ steps.function-exists.outputs.exists }}
      environment: ${{ steps.function-options.outputs.environment }}
      language: ${{ steps.function-options.outputs.language }}
      runtime: ${{ steps.function-options.outputs.runtime }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Check For Existing Function
        id: function-exists
        shell: bash
        run: |
          if [ -d "./functions/${{ inputs.function }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Get Function Options
        id: function-options
        uses: ./.github/actions/function-options
        with:
          function: ${{ inputs.function }}

      - name: Get Function Versions
        uses: ./.github/actions/function-versions
        id: function-versions
        with:
          upstream-version: ${{ steps.function-options.outputs.version }}

  build:
    name: Build
    needs: ["prepare"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Get Function Options
        id: function-options
        uses: ./.github/actions/function-options
        with:
          function: ${{ inputs.function }}

      - name: Get Function Versions
        uses: ./.github/actions/function-versions
        id: function-versions
        with:
          upstream-version: ${{ steps.function-options.outputs.version }}

      - name: Setup Python
        if: needs.prepare.outputs.language == 'python'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ needs.prepare.outputs.runtime }}
          cache: pip
          cache-dependency-path: ./functions/${{ inputs.function }}/requirements.txt

      - name: Setup Node.js
        if: needs.prepare.outputs.language == 'node'
        uses: actions/setup-node@v4.1.0
        with:
          node-version: ${{ needs.prepare.outputs.runtime }}
          cache: npm
          cache-dependency-path: ./functions/${{ inputs.function }}/package.json

      - name: Setup Go
        if: needs.prepare.outputs.language == 'go'
        uses: actions/setup-go@v5.2.0
        with:
          go-version: ${{ needs.prepare.outputs.runtime }}
          cache: true
          cache-dependency-path: ./functions/${{ inputs.function }}/go.sum

      - name: Install Dependencies (Python)
        if: needs.prepare.outputs.language == 'python'
        shell: bash
        run: |
          if [ -f "./functions/${{ inputs.function }}/requirements.txt" ]; then
            pip install --requirement ./functions/${{ inputs.function }}/requirements.txt --target ./functions/${{ inputs.function }}
          fi

      - name: Install Dependencies (Node.js)
        if: needs.prepare.outputs.language == 'node'
        shell: bash
        run: |
          if [ -f "./functions/${{ inputs.function }}/package.json" ]; then
            cd ./functions/${{ inputs.function }}
            npm ci --production
            mkdir -p .fission/deps
            mv node_modules/* .fission/deps/
          fi

      - name: Install Dependencies (Go)
        if: needs.prepare.outputs.language == 'go'
        shell: bash
        run: |
          if [ -f "./functions/${{ inputs.function }}/go.mod" ]; then
            cd ./functions/${{ inputs.function }}
            mkdir -p .fission/deps
            go mod download -modcacherw
            cp -r $GOPATH/pkg/mod/* .fission/deps/ || true
          fi

      - name: Add Include Directory
        shell: bash
        run: |
          if [ -d "./include" ]; then
            rsync -a --ignore-existing ./include/ ./functions/${{ inputs.function }}/
          fi

      - name: Package Function
        shell: bash
        run: |
          cd ./functions/${{ inputs.function }}
          zip -r ../${{ inputs.function }}-${{ steps.function-versions.outputs.semantic }}.zip . \
            -x '.fission/*' \
            -x '.git/*' \
            -x '__pycache__/*' \
            -x '*.pyc' \
            -x 'node_modules/*' \
            -x '.gitignore' \
            -x 'tests/*'

      - name: Upload Function Package
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ inputs.function }}-package
          path: functions/${{ inputs.function }}-${{ steps.function-versions.outputs.semantic }}.zip
          retention-days: 1

      - if: ${{ ! inputs.release }}
        name: Run Function Tests
        uses: ./.github/actions/function-tests
        with:
          function: ${{ inputs.function }}
          language: ${{ needs.prepare.outputs.language }}
          runtime: ${{ needs.prepare.outputs.runtime }}

      - if: ${{ inputs.release }}
        name: Upload Release Asset
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ inputs.function }}-release-asset
          path: functions/${{ inputs.function }}-${{ steps.function-versions.outputs.semantic }}.zip
          retention-days: 1

  release:
    if: ${{ inputs.release && needs.prepare.outputs.function-exists == 'true' }}
    name: Release
    needs: ["prepare", "build"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Get Function Options
        id: function-options
        uses: ./.github/actions/function-options
        with:
          function: ${{ inputs.function }}

      - name: Get Release Tag
        uses: ./.github/actions/release-tag
        id: release
        with:
          token: ${{ github.token }}

      - name: Download Release Asset
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: ${{ inputs.function }}-release-asset
          path: ${{ runner.temp }}

      - name: Create Release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          body: |
            > [!NOTE]
            > A new function has been added.

            ## 📦 Function

            **Name**: ${{ inputs.function }}
            **Environment**: ${{ needs.prepare.outputs.environment }}
            **Language**: ${{ needs.prepare.outputs.language }} ${{ needs.prepare.outputs.runtime }}
            **Source**: <${{ steps.function-options.outputs.source }}>
          tag: ${{ steps.release.outputs.tag }}
          token: ${{ github.token }}
          artifacts: ${{ runner.temp }}/${{ inputs.function }}-*.zip
