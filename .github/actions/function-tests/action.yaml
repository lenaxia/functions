---
# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Function Tests
description: Tests a Fission function based on its runtime

inputs:
  function:
    description: Function Name
    required: true
  runtime:
    description: Runtime (python, nodejs, go)
    required: true

runs:
  using: composite
  steps:
    - name: Setup Python
      if: startsWith(inputs.runtime, 'python')
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: ./functions/${{ inputs.function }}/requirements.txt

    - name: Setup Node.js
      if: startsWith(inputs.runtime, 'node')
      uses: actions/setup-node@v4.1.0
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: ./functions/${{ inputs.function }}/package.json

    - name: Setup Go
      if: startsWith(inputs.runtime, 'go')
      uses: actions/setup-go@v5.2.0
      with:
        go-version: '1.21'
        cache: true
        cache-dependency-path: ./functions/${{ inputs.function }}/go.sum

    - name: Install Test Dependencies (Python)
      if: startsWith(inputs.runtime, 'python')
      shell: bash
      run: |
        if [ -f "./functions/${{ inputs.function }}/requirements-test.txt" ]; then
          pip install --requirement ./functions/${{ inputs.function }}/requirements-test.txt
        fi

    - name: Install Test Dependencies (Node.js)
      if: startsWith(inputs.runtime, 'node')
      shell: bash
      run: |
        if [ -f "./functions/${{ inputs.function }}/package.json" ]; then
          cd ./functions/${{ inputs.function }}
          npm ci
        fi

    - name: Run Python Tests
      if: startsWith(inputs.runtime, 'python')
      shell: bash
      run: |
        cd ./functions/${{ inputs.function }}
        if [ -f "pytest.ini" ]; then
          pytest tests/
        else
          python -m pytest tests/ -v
        fi

    - name: Run Node.js Tests
      if: startsWith(inputs.runtime, 'node')
      shell: bash
      run: |
        cd ./functions/${{ inputs.function }}
        npm test

    - name: Run Go Tests
      if: startsWith(inputs.runtime, 'go')
      shell: bash
      run: |
        cd ./functions/${{ inputs.function }}
        go test -v ./...
