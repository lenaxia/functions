---
# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Function Tests
description: Tests a Fission function based on its runtime

inputs:
  function:
    description: Function Name
    required: true
  runtime:
    description: Runtime (python, nodejs, go)
    required: true

runs:
  using: composite
  steps:
    - name: Setup Python
      if: inputs.runtime == 'python'
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359f38c75c6ac13ef # v5.3.0
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: ./functions/${{ inputs.function }}/requirements.txt

    - name: Setup Node.js
      if: inputs.runtime == 'nodejs'
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: ./functions/${{ inputs.function }}/package.json

    - name: Setup Go
      if: inputs.runtime == 'go'
      uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4b1 # v5.2.0
      with:
        go-version: '1.21'
        cache: true
        cache-dependency-path: ./functions/${{ inputs.function }}/go.sum

    - name: Install Test Dependencies (Python)
      if: inputs.runtime == 'python' && hashFiles('./functions/${{ inputs.function }}/requirements-test.txt') != ''
      shell: bash
      run: |
        pip install --requirement ./functions/${{ inputs.function }}/requirements-test.txt

    - name: Install Test Dependencies (Node.js)
      if: inputs.runtime == 'nodejs' && hashFiles('./functions/${{ inputs.function }}/package.json') != ''
      shell: bash
      run: |
        cd ./functions/${{ inputs.function }}
        npm ci

    - name: Run Python Tests
      if: inputs.runtime == 'python' && hashFiles('./functions/${{ inputs.function }}/tests/**/*.py') != ''
      shell: bash
      run: |
        cd ./functions/${{ inputs.function }}
        if [ -f "pytest.ini" ]; then
          pytest tests/
        else
          python -m pytest tests/ -v
        fi

    - name: Run Node.js Tests
      if: inputs.runtime == 'nodejs' && hashFiles('./functions/${{ inputs.function }}/tests/**/*.test.js') != ''
      shell: bash
      run: |
        cd ./functions/${{ inputs.function }}
        npm test

    - name: Run Go Tests
      if: inputs.runtime == 'go' && hashFiles('./functions/${{ inputs.function }}/**/*_test.go') != ''
      shell: bash
      run: |
        cd ./functions/${{ inputs.function }}
        go test -v ./...
