---
# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Function Options
description: Takes a function and returns various fields from its config.yaml file

inputs:
  function:
    description: Function Name
    required: true

outputs:
  environment:
    description: Fission environment name
    value: ${{ steps.options.outputs.environment }}
  language:
    description: Programming language (python, node, go)
    value: ${{ steps.options.outputs.language }}
  runtime:
    description: Runtime version (e.g. 3.11, 20, 1.21)
    value: ${{ steps.options.outputs.runtime }}
  source:
    description: Source repository URL
    value: ${{ steps.options.outputs.source }}
  version:
    description: Function version
    value: ${{ steps.options.outputs.version }}

runs:
  using: composite
  steps:
    - name: Function Options
      id: options
      shell: bash
      working-directory: ./functions/${{ inputs.function }}
      run: |
        ENVIRONMENT=$(yq -r '.environment' config.yaml)
        LANGUAGE=$(yq -r '.language' config.yaml)
        RUNTIME=$(yq -r '.runtime' config.yaml)
        SOURCE=$(yq -r '.source' config.yaml)
        VERSION=$(yq -r '.version' config.yaml)

        echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
        echo "language=${LANGUAGE}" >> $GITHUB_OUTPUT
        echo "runtime=${RUNTIME}" >> $GITHUB_OUTPUT
        echo "source=${SOURCE}" >> $GITHUB_OUTPUT
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
